
# 基础服务配置
server.port=8080
spring.application.name=medication-backend
spring.main.banner-mode=console

# 压缩配置
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# Tomcat 上传表单大小限制
server.tomcat.max-http-form-post-size=5MB

# 数据源配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/lyl?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
spring.datasource.username=${DB_USER:root}
# 仅本地开发默认值，生产环境必须通过 DB_PASSWORD 覆盖。
spring.datasource.password=${DB_PASSWORD:btty123}
# Hikari 连接池
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Redis 配置
spring.redis.host=${REDIS_HOST:127.0.0.1}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=2s
spring.redis.client-type=lettuce

# Jackson 时间与序列化
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.serialization.write-dates-as-timestamps=false

# 文件上传
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.resolve-lazily=true

# MyBatis-Plus
mybatis-plus.type-aliases-package=com.liyile.medication.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.cache-enabled=false

# 日志
logging.level.root=INFO
logging.level.com.liyile.medication=INFO
logging.level.org.springframework.web=INFO
logging.file.name=logs/app.log

# 管理端点
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# 业务自定义配置
app.upload-dir=./uploads/images
# 开发环境允许使用占位密钥，JwtTokenProvider 会自动回退到稳定的本地测试密钥。
app.jwt.secret=${JWT_SECRET:change-this-in-production}
app.jwt.expiration-days=${JWT_EXPIRATION_DAYS:1}
app.version=1.0.0
